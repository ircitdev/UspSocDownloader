# Nginx configuration for socdownloader.tools.uspeshnyy.ru
# Location: /etc/nginx/sites-available/socdownloader-docs

server {
    listen 80;
    listen [::]:80;
    server_name socdownloader.tools.uspeshnyy.ru;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name socdownloader.tools.uspeshnyy.ru;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/socdownloader.tools.uspeshnyy.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/socdownloader.tools.uspeshnyy.ru/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Telegram Mini Apps specific headers
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    # Root directory
    root /opt/uspsocdowloader/help;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # Main location
    location / {
        try_files $uri $uri/ =404;

        # Cache static files
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # Logs
    access_log /var/log/nginx/socdownloader-docs-access.log;
    error_log /var/log/nginx/socdownloader-docs-error.log;
}
